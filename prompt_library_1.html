<h1>📚 База промптов по отделам</h1>
<p class="subtitle">105 промптов · 7 отделов · Скопируй и используй</p>
<div class="tabs" id="tabs"></div>
<div class="search-wrap">
  <span class="search-icon">🔍</span>

<div class="cards-grid" id="grid"></div>
<script>
const depts = [
  { id: 'sales', name: 'Продажи', icon: '💼', prompts: [
    { title: 'Холодное письмо клиенту', text: 'Напиши холодное коммерческое письмо для [тип клиента] в сфере [отрасль]. Наш продукт: [описание]. Упомяни 1–2 конкретные боли клиента. Объём — 5–7 предложений. Заверши чётким CTA.' },
    { title: 'Отработка возражения «Дорого»', text: 'Клиент говорит: «У вас дорого». Напиши 3 варианта ответа: (1) через ROI, (2) через сравнение с конкурентами, (3) через пересмотр ценности продукта. Тон — уверенный, без давления.' },
    { title: 'Follow-up после встречи', text: 'Напиши письмо-follow-up после встречи с потенциальным клиентом. Что обсудили: [тезисы]. Следующий шаг: [действие]. Сделай письмо тёплым, напомни о ключевой выгоде и предложи конкретную дату следующего касания.' },
    { title: 'Скрипт для звонка', text: 'Создай скрипт для 5-минутного холодного звонка. Продукт: [описание]. ЦА: [описание]. Включи: приветствие, квалификационный вопрос, мини-питч, вопрос для вовлечения и договорённость о следующем шаге.' },
    { title: 'Анализ конкурента для питча', text: 'Сравни наш продукт [описание] с конкурентом [название]. Выдели 5 ключевых отличий в формате таблицы: параметр / мы / они / наше преимущество. Акцентируй то, что важно для клиента из сферы [отрасль].' },
    { title: 'Коммерческое предложение', text: 'Составь структуру одностраничного коммерческого предложения для клиента [описание]. Включи: ситуацию клиента, нашу ценность, состав и цену пакета, кейс или цифры, призыв к действию. Тон — деловой, без воды.' },
    { title: 'Реактивация потерянного клиента', text: 'Напиши письмо клиенту, с которым мы не работали [N месяцев]. Причина ухода: [если известна]. Предложи повод для возврата — без скидки, через новое предложение или изменение в продукте.' },
    { title: 'Уточняющие вопросы на встрече', text: 'Придумай 10 открытых вопросов для выявления потребностей клиента в сфере [отрасль]. Вопросы должны охватывать: текущую ситуацию, боли, желаемый результат, критерии выбора, бюджет и сроки.' },
    { title: 'Резюме переговоров', text: 'На основе этих заметок с переговоров [вставить текст] составь структурированное резюме: договорённости, открытые вопросы, риски, следующие шаги с ответственными и дедлайнами.' },
    { title: 'Питч для топ-менеджера', text: 'Напиши 60-секундный питч продукта [описание] для CEO компании из сферы [отрасль]. Без технических деталей — только бизнес-ценность, цифры и конкретный следующий шаг.' },
    { title: 'Кейс клиента', text: 'Преобразуй эти сырые данные о результатах клиента [вставить] в убедительный мини-кейс для сайта или питч-дека: ситуация до, что сделали, результат в цифрах, цитата клиента.' },
    { title: 'Подготовка к возражениям', text: 'Перечисли 7 самых частых возражений при продаже [продукта] клиентам из [сегмента]. Для каждого напиши: суть возражения, скрытый страх за ним, и 2 варианта ответа продавца.' },
    { title: 'Апсейл существующему клиенту', text: 'Напиши короткое сообщение существующему клиенту [описание] с предложением допродажи [продукт/услуга]. Логика: клиент уже получил X, следующий шаг — Y, это даст ему Z.' },
    { title: 'LinkedIn-сообщение для аутрич', text: 'Напиши 3 варианта короткого сообщения (до 150 символов) для LinkedIn-аутрич к [должность] из [отрасль]. Каждый вариант — разный угол: боль, триггер событий, общий контакт.' },
    { title: 'Прогноз сделки и риски', text: 'На основе данных о сделке [вставить: этап, активность, бюджет, сроки, стейкхолдеры] оцени вероятность закрытия, выдели 3 главных риска и предложи действия для продвижения.' },
  ]},
  { id: 'procurement', name: 'Закупки', icon: '📦', prompts: [
    { title: 'Запрос коммерческого предложения (RFQ)', text: 'Составь запрос коммерческого предложения для закупки [товар/услуга]. Укажи: объём, требования к качеству, сроки поставки, условия оплаты и критерии оценки. Тон — официальный.' },
    { title: 'Сравнительный анализ поставщиков', text: 'Создай матрицу оценки 3–5 поставщиков по параметрам: цена, качество, сроки, надёжность, условия, репутация. Данные: [вставить]. Определи оптимального поставщика и обоснуй выбор.' },
    { title: 'Письмо о начале переговоров', text: 'Напиши официальное письмо поставщику [название] для начала переговоров по пересмотру условий контракта. Наша цель: снизить цену на X% или улучшить [условие]. Аргументы: [вставить].' },
    { title: 'Анализ TCO (совокупной стоимости)', text: 'Помоги рассчитать TCO для закупки [продукт/оборудование]. Категории затрат: покупка, доставка, установка, обслуживание, обучение, утилизация. Данные: [вставить]. Оформи в таблицу.' },
    { title: 'Чеклист due diligence поставщика', text: 'Составь чеклист due diligence для нового поставщика в сфере [отрасль]. Включи проверку: юридического статуса, финансовой устойчивости, качества, репутации, соответствия стандартам и ESG-критериям.' },
    { title: 'Ключевые пункты договора поставки', text: 'Выдели 10 ключевых пунктов, которые обязательно должны быть в договоре поставки [товар]. Для каждого — что проверить и на что обратить внимание с позиции покупателя.' },
    { title: 'Ответ на завышенную цену', text: 'Напиши письмо поставщику, цена которого превышает наш бюджет на X%. Попроси обосновать цену и предложи пути оптимизации: скидка за объём, изменение спецификации, рассрочка.' },
    { title: 'Оценка риска цепочки поставок', text: 'Проведи анализ рисков для цепочки поставок по категории [товар]. Оцени: географические риски, зависимость от одного поставщика, валютные риски, логистику, регуляторные ограничения. Предложи митигацию.' },
    { title: 'Брифинг по новой категории закупок', text: 'Составь брифинг по новой категории закупок: [категория]. Включи: описание рынка, ключевых игроков, ценовые тренды, риски, рекомендуемую стратегию и KPI.' },
    { title: 'Письмо об отказе поставщику', text: 'Напиши вежливое официальное письмо об отказе поставщику [название] по итогам тендера. Причина: [основная]. Сохрани возможность для сотрудничества в будущем.' },
    { title: 'Обоснование закупки для руководства', text: 'Подготовь обоснование закупки [товар/услуга] для руководства. Включи: бизнес-необходимость, ROI или экономию, альтернативы которые рассмотрели, рекомендуемый поставщик и условия.' },
    { title: 'KPI для отдела закупок', text: 'Предложи систему KPI для отдела закупок компании в сфере [отрасль]. Сгруппируй по блокам: эффективность затрат, качество, скорость, работа с поставщиками. По 3–4 метрики на блок.' },
    { title: 'Претензия поставщику', text: 'Составь официальную претензию поставщику [название] по факту нарушения: [описание — срыв сроков / ненадлежащее качество / неверная комплектация]. Укажи ущерб, требование и срок ответа.' },
    { title: 'Структура тендерной документации', text: 'Создай структуру тендерной документации для закупки [товар/услуга] на сумму [бюджет]. Включи все обязательные разделы, критерии оценки с весами и инструкции для участников.' },
    { title: 'Консолидация закупок', text: 'Проанализируй возможность консолидации закупок по категории [товар] у нескольких подразделений. Данные о текущих закупках: [вставить]. Оцени потенциальную экономию и организационные изменения.' },
  ]},
  { id: 'marketing', name: 'Маркетинг', icon: '📣', prompts: [
    { title: 'Контент-план на месяц', text: 'Составь контент-план на [месяц] для [канал: Instagram/LinkedIn/Telegram] компании из сферы [отрасль]. ЦА: [описание]. По 4 публикации в неделю. Для каждой — тип контента, тема, формат, ключевой месседж.' },
    { title: 'Пост для соцсетей', text: 'Напиши пост для [платформа] на тему [тема] для аудитории [описание]. Тон: [экспертный / вдохновляющий / провокационный / нейтральный]. Длина: [короткий до 150 слов / стандартный до 300 слов]. Добавь 5 хэштегов.' },
    { title: 'Email-рассылка', text: 'Напиши письмо для email-рассылки по теме [тема]. Аудитория: [сегмент]. Цель: [продажа / прогрев / информирование / реактивация]. Включи: тему письма, прехедер, тело письма и CTA.' },
    { title: 'Описание продукта для сайта', text: 'Напиши продающий текст для страницы продукта [название]. ЦА: [описание]. Структура: заголовок, ключевые выгоды (3–5), описание, социальное доказательство, CTA. SEO-ключи: [список].' },
    { title: 'Бриф для рекламной кампании', text: 'Составь бриф для рекламной кампании продукта [название] на [платформа]. Включи: цель, ЦА и сегменты, ключевое сообщение, тон, форматы объявлений, бюджет и KPI.' },

    { title: 'Стратегия продвижения запуска', text: 'Составь стратегию продвижения запуска [продукт/услуга] в [каналы]. Горизонт: [срок]. Включи: pre-launch, launch, post-launch активности, контент, метрики на каждом этапе.' },

let activeId = 'sales';
let searchQuery = '';

function renderTabs() {
  const el = document.getElementById('tabs');
  el.innerHTML = '';
  const all = { id: 'all', name: 'Все отделы', icon: '⚡' };
  [all, ...depts].forEach(d => {
    const btn = document.createElement('button');
    const cls = d.id === activeId ? `tab active-${d.id}` : 'tab';
    btn.className = cls;
    const count = d.id === 'all' ? depts.reduce((s, x) => s + x.prompts.length, 0) : d.prompts.length;
    btn.innerHTML = `${d.icon} ${d.name} <span class="count-badge">${count}</span>`;
    btn.onclick = () => { activeId = d.id; renderTabs(); renderGrid(); };
    el.appendChild(btn);
  });
}

function renderGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  const activeDepts = activeId === 'all' ? depts : depts.filter(d => d.id === activeId);
  const q = searchQuery.toLowerCase();
  let count = 0;
  activeDepts.forEach(dept => {
    dept.prompts.forEach((p, i) => {
      if (q && !p.title.toLowerCase().includes(q) && !p.text.toLowerCase().includes(q)) return;
      count++;
      const card = document.createElement('div');
      card.className = `card card-${dept.id}`;
      card.innerHTML = `
        <div class="card-bar bar-${dept.id}"></div>
        <div class="card-header">
          <span class="card-num num-${dept.id}">${dept.icon} ${dept.name} · ${i + 1}</span>
          <span class="card-title">${p.title}</span>
        </div>
        <div class="card-prompt">${p.text}</div>
        <button class="copy-btn" onclick="copyPrompt(this, \`${p.text.replace(/`/g, "'")}\`)">📋 Скопировать промпт</button>
      `;
      grid.appendChild(card);
    });
  });
  if (count === 0) grid.innerHTML = '<div class="empty">Ничего не найдено 🔍<br><small>Попробуй другой запрос</small></div>';
}

function copyPrompt(btn, text) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✅ Скопировано!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '📋 Скопировать промпт'; btn.classList.remove('copied'); }, 2000);
  });
}

document.getElementById('search').addEventListener('input', e => { searchQuery = e.target.value; renderGrid(); });
renderTabs();
renderGrid();
</script>
</body>
